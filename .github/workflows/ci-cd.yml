name: Insured Assurance CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: insured-assurance-artifact
        path: target/*.war

    - name: Trigger Jenkins Deployment Job
      run: |
        curl -X POST "http://13.218.233.148/job/insured-assurance-deploy/buildWithParameters" \
        --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
        --data-urlencode WAR_URL="https://github.com/${{ github.repository }}/releases/latest/download/app.war"
